<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d7a5f" />
    <meta name="description" content="음성 등록과 일정 관리를 지원하는 Todo 웹앱" />
    <title>Todo</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">오늘의 작업</p>
            <h1 id="app-title">Todo</h1>
          </div>
          <div class="top-actions">
            <button id="summaryButton" class="ai-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
              </svg>
              AI 요약
            </button>
            <div class="theme-switcher" aria-label="디자인 컬러 선택">
              <button class="theme-option active" type="button" data-theme="forest" aria-label="그린 테마" aria-pressed="true">
                <span class="swatch forest"></span>
              </button>
              <button class="theme-option" type="button" data-theme="ocean" aria-label="블루 테마" aria-pressed="false">
                <span class="swatch ocean"></span>
              </button>
              <button class="theme-option" type="button" data-theme="coral" aria-label="코랄 테마" aria-pressed="false">
                <span class="swatch coral"></span>
              </button>
            </div>
            <div class="summary" aria-live="polite">
              <svg class="progress-ring" viewBox="0 0 88 88" aria-hidden="true">
                <circle class="ring-track" cx="44" cy="44" r="38" />
                <circle class="ring-fill" id="progressRingFill" cx="44" cy="44" r="38" />
              </svg>
              <div class="summary-inner">
                <span id="remainingCount">0</span>
                <span>남음</span>
              </div>
            </div>
          </div>
        </header>

        <form id="todoForm" class="composer" autocomplete="off">
          <label class="field text-field">
            <span>할 일</span>
            <input id="todoInput" name="todo" type="text" placeholder="새 할 일을 입력하세요" maxlength="120" required />
          </label>
          <div class="field schedule-field">
            <span>마감</span>
            <input id="dueInput" name="due" type="hidden" />
            <div class="schedule-picker">
              <input id="dateInput" type="date" aria-label="마감 날짜" />
              <label class="time-control" title="마감 시간 설정">
                <svg aria-hidden="true" viewBox="0 0 24 24" class="clock-icon">
                  <circle cx="12" cy="12" r="8" />
                  <path d="M12 8v5l3 2" />
                </svg>
                <span class="visually-hidden">마감 시간</span>
                <input id="timeInput" type="time" aria-label="마감 시간" />
              </label>
            </div>
            <div class="quick-dates" aria-label="빠른 날짜 선택">
              <button type="button" data-quick-date="today">오늘</button>
              <button type="button" data-quick-date="tomorrow">내일</button>
              <button type="button" data-quick-date="next-week">다음 주</button>
              <button type="button" data-quick-date="clear">없음</button>
            </div>
          </div>
          <label class="field">
            <span>우선순위</span>
            <select id="priorityInput" name="priority">
              <option value="normal">● 보통</option>
              <option value="high">▲ 높음</option>
              <option value="low">▼ 낮음</option>
            </select>
          </label>
          <div class="voice-wrap">
            <button
              id="voiceButton"
              class="voice-button"
              type="button"
              aria-label="음성으로 일정 등록"
              aria-pressed="false"
              title="음성으로 일정 등록: 내일 오후 3시 병원 예약 중요"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24" class="mic-icon">
                <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z" />
                <path d="M19 11a7 7 0 0 1-14 0" />
                <path d="M12 18v3" />
                <path d="M8 21h8" />
              </svg>
              <span class="visually-hidden">음성으로 일정 등록</span>
            </button>
          </div>
          <button id="submitButton" class="primary-button" type="submit">추가</button>
          <button id="cancelEditButton" class="ghost-button cancel-edit hidden" type="button">취소</button>
        </form>

        <p id="voiceStatus" class="voice-status" aria-live="polite"></p>

        <div class="tools">
          <label class="search">
            <span class="visually-hidden">검색</span>
            <input id="searchInput" type="search" placeholder="검색" />
          </label>
          <div class="filters" role="tablist" aria-label="할 일 필터">
            <button class="filter active" type="button" data-filter="all" role="tab" aria-selected="true">전체</button>
            <button class="filter" type="button" data-filter="active" role="tab" aria-selected="false">진행</button>
            <button class="filter" type="button" data-filter="completed" role="tab" aria-selected="false">완료</button>
          </div>
        </div>

        <ul id="todoList" class="todo-list" aria-live="polite"></ul>

        <footer class="footer">
          <div class="stats">
            <span><strong id="totalCount">0</strong> 전체</span>
            <span><strong id="doneCount">0</strong> 완료</span>
          </div>
          <button id="clearCompleted" class="ghost-button" type="button">완료 삭제</button>
        </footer>
      </section>
    </main>

    <template id="todoTemplate">
      <li class="todo-item">
        <label class="check-wrap">
          <input class="todo-check" type="checkbox" />
          <span></span>
        </label>
        <div class="todo-content">
          <input class="todo-title" type="text" maxlength="120" />
          <div class="meta">
            <span class="priority"></span>
            <span class="due"></span>
            <span class="ai-tag"></span>
          </div>
        </div>
        <div class="item-actions">
          <button class="text-button breakdown-button" type="button">분해</button>
          <button class="text-button edit-button" type="button">수정</button>
        </div>
        <button class="icon-button delete-button" type="button" aria-label="삭제">×</button>
      </li>
    </template>

    <div id="summaryModal" class="summary-modal hidden" role="dialog" aria-modal="true" aria-labelledby="summaryModalTitle">
      <div class="summary-modal-box">
        <div class="summary-modal-header">
          <span id="summaryModalTitle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
            </svg>
            AI 요약
          </span>
          <button id="closeSummaryModal" class="icon-button" type="button" aria-label="닫기">×</button>
        </div>
        <div id="summaryModalBody"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
